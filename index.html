<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 책자/브로슈어 견적시스템</title>
    <meta name="description" content="표지부터 내지까지 커스텀 가능한 전문적인 인쇄물 견적 및 주문 시스템">
    <script type="module" src="./main.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <h1>Printing Quotation System</h1>
        
        <main class="container">
            <!-- Left Panel: Form Sections -->
            <div class="calculator-form">
                <!-- Step Indicator -->
                <div class="stepper">
                    <div class="step active" data-step="1" onclick="changeStep(1)">1. 기본설정</div>
                    <div class="step" data-step="2" onclick="changeStep(2)">2. 표지사양</div>
                    <div class="step" data-step="3" onclick="changeStep(3)">3. 내지사양</div>
                    <div class="step" data-step="4" onclick="changeStep(4)">4. 주문목록 확인</div>
                    <div class="step" data-step="5" onclick="changeStep(5)">5. 최종 주문</div>
                </div>

                <!-- 1. General Book Settings -->
                <div class="step-content active" id="step-1">
                    <section class="card">
                        <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-edit"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 프로젝트 명칭</h2>
                        <div class="form-group">
                            <label>책자 제목 (Project Title)</label>
                            <input type="text" id="book-title" placeholder="예: 2024 상반기 기업 보고서" style="font-size: 1.1rem; padding: 0.8rem;">
                        </div>

                        <h2 style="margin-top: 2rem;"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M20 16.5A2.5 2.5 0 0 0 17.5 14H7.5A2.5 2.5 0 0 0 5 16.5V19a1 1 0 0 1-1 1h16a1 1 0 0 0 1-1v-2.5Z"/><path d="M5 20V5h12.5A2.5 2.5 0 0 1 20 7.5V14"/><path d="M5 5V3a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v2.5"/></svg> 기본 사양</h2>
                        <div class="form-group">
                            <label>사이즈 선택</label>
                            <div id="size-options" class="options-grid"></div>
                            <div id="custom-size-fields" style="display: none; margin-top: 1rem; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <input type="number" id="custom-width" placeholder="가로 (mm)">
                                <input type="number" id="custom-height" placeholder="세로 (mm)">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>제본 방법</label>
                            <div id="binding-options" class="options-grid"></div>
                        </div>
                        <div class="form-group">
                            <label>주문 수량</label>
                            <input type="number" id="quantity" value="1" min="1">
                        </div>
                    </section>
                    <div class="step-actions">
                        <button type="button" class="next-btn" onclick="changeStep(2)">다음: 표지 사양 ➜</button>
                    </div>
                </div>

                <!-- 2. Cover Settings -->
                <div class="step-content" id="step-2">
                    <section class="card">
                        <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg> 표지 사양</h2>
                        <div class="form-group">
                            <label>표지 재질 및 두께</label>
                            <select id="cover-material"></select>
                        </div>
                        <div class="form-group">
                            <label>가공/후가공 (복수 선택 가능)</label>
                            <div id="finishing-options" class="options-grid"></div>
                        </div>
                    </section>
                    <div class="step-actions">
                        <button type="button" class="prev-btn" onclick="changeStep(1)">⬅ 이전</button>
                        <button type="button" class="next-btn" onclick="changeStep(3)">다음: 내지 사양 ➜</button>
                    </div>
                </div>

                <!-- 3. Inner Pages Settings -->
                <div class="step-content" id="step-3">
                    <section class="card">
                        <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg> 내지 사양</h2>
                        <div class="form-group">
                            <label>내지 재질 및 두께</label>
                            <select id="inner-material"></select>
                        </div>
                        <div class="form-group">
                            <label>내지 인쇄 방식</label>
                            <div id="print-sides" class="options-grid">
                                <div class="option-btn active" data-value="double">양면 인쇄</div>
                                <div class="option-btn" data-value="single">단면 인쇄</div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>내지 페이지 수</label>
                            <input type="number" id="inner-pages" value="16" min="2" step="2">
                        </div>
                        <div class="form-group">
                            <label>내지 컬러/흑백</label>
                            <div id="print-color" class="options-grid">
                                <div class="option-btn active" data-value="color">컬러 인쇄</div>
                                <div class="option-btn" data-value="bw">흑백 인쇄</div>
                            </div>
                        </div>
                    </section>
                    <div class="step-actions">
                        <button type="button" class="prev-btn" onclick="changeStep(2)">⬅ 이전 (표지 사양)</button>
                        <div style="display:flex; gap:8px;">
                            <button type="button" class="next-btn" style="background:#22c55e;" id="confirm-and-more-btn">담고 하나 더 추가 ✚</button>
                            <button type="button" class="next-btn" style="background:var(--primary);" id="confirm-book-btn">담고 목록 확인 ➜</button>
                        </div>
                    </div>
                </div>

                <!-- 4. Order List Confirmation -->
                <div class="step-content" id="step-4">
                    <section class="card">
                        <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg> 주문목록 확인</h2>
                        <div id="cart-list" class="cart-scroll-area"></div>
                        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                            <button type="button" id="add-more-books-btn" class="next-btn" style="background:#22c55e; flex:1;">다른 책 추가하기</button>
                            <button type="button" id="go-to-shipping-btn" class="next-btn" style="flex:1;">주문 마감 및 배송지 입력 ➜</button>
                        </div>
                    </section>
                </div>

                <!-- 5. Final Order & Shipping -->
                <div class="step-content" id="step-5">
                    <section class="card">
                        <h2>최종 주문 및 배송 정보</h2>
                        <div class="form-group"><label>주문자 성함</label><input type="text" id="orderer-name"></div>
                        <div class="form-group"><label>연락처 (Phone)</label><input type="tel" id="orderer-phone"></div>
                        <div class="form-group">
                            <label>배송지 주소 (Address)</label>
                            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                <input type="text" id="postcode" placeholder="우편번호" readonly style="flex: 1;">
                                <button type="button" id="search-address-btn" style="padding:0 20px; background:#64748b; color:white; border:none; border-radius:6px;">주소 검색</button>
                            </div>
                            <input type="text" id="delivery-address" placeholder="기본 주소" readonly style="margin-bottom: 8px;">
                            <input type="text" id="delivery-address-detail" placeholder="상세 주소">
                        </div>
                    </section>
                    <div class="step-actions">
                        <button type="button" class="prev-btn" onclick="changeStep(4)">⬅ 이전</button>
                        <button type="button" id="order-btn" class="next-btn" style="background:#ef4444;">최종 주문하기 ➜</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <aside class="calculator-sidebar">
                <section class="card sticky">
                    <h2>실시간 요약 및 견적</h2>
                    <div id="summary-content" class="summary-list"></div>
                    <div class="order-box">
                        <div class="price-row"><span>소계</span><span id="subtotal">0원</span></div>
                        <div class="price-row"><span>부과세(10%)</span><span id="tax">0원</span></div>
                        <div class="total-row"><span>최종 금액</span><span id="total-amount">0원</span></div>
                    </div>
                    <h3 style="margin-top:2rem;">Preview Mockup</h3>
                    <div id="mockup-container"></div>
                </section>
            </aside>
        </main>
    </div>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</body>
</html>
