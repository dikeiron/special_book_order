<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 책자/브로슈어 견적시스템 - 최종 완결판</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
          --primary: #4a90e2;
          --primary-hover: #357abd;
          --bg-dark: #0f172a;
          --card-bg: #1e293b;
          --text-main: #f1f5f9;
          --text-dim: #94a3b8;
          --border: #334155;
          --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
        #app { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 2rem; background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.2rem; }
        
        .container { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; align-items: start; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .stepper { display: flex; justify-content: space-between; margin-bottom: 2rem; background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px; }
        .step { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; color: var(--text-dim); cursor: pointer; transition: 0.3s; }
        .step.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.4); }

        .step-content { display: none; animation: fadeIn 0.4s ease; }
        .step-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.8rem; margin-top: 0.5rem; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 0.8rem; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .option-btn:hover { border-color: var(--primary); background: rgba(74,144,226,0.1); }
        .option-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        select, input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 10px; font-size: 1rem; }
        label { display: block; margin-top: 1.2rem; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 0.4rem; }
        
        .step-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .next-btn, .submit-btn { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1.1rem; width: 100%; transition: 0.3s; }
        .next-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .prev-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 1rem; border-radius: 12px; cursor: pointer; width: 120px; }

        .sidebar { position: sticky; top: 1.5rem; }
        .total-price { font-size: 2rem; color: var(--primary); font-weight: 700; text-align: right; margin-top: 1rem; }
        .cart-item { border-left: 4px solid var(--primary); background: rgba(255,255,255,0.02); margin-bottom: 1rem; padding: 1.2rem; border-radius: 0 12px 12px 0; }
        
        .mockup-viewport { height: 250px; perspective: 1000px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 16px; margin-bottom: 1rem; overflow: hidden; }
        .book { position: relative; width: 120px; height: 170px; transform-style: preserve-3d; transform: rotateY(-30deg) rotateX(15deg); }
        .side { position: absolute; background: #fff; border: 1px solid #ccc; }
        .front { width: 120px; height: 170px; z-index: 2; background: #e2e8f0; border-radius: 0 4px 4px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .spine { height: 170px; background: #cbd5e1; transform: rotateY(-90deg); transform-origin: left; }
        .top { width: 120px; background: #f8fafc; transform: rotateX(90deg); transform-origin: top; }
        .title-label { font-size: 0.7rem; border: 1px solid #334155; padding: 10px; max-width: 80%; text-align: center; color: #334155; background: rgba(255,255,255,0.7); }

        @media (max-width: 968px) { .container { grid-template-columns: 1fr; } .sidebar { position: static; } }
    </style>
</head>
<body>
    <div id="app">
        <h1>Printing Quotation System</h1>
        
        <main class="container">
            <div class="calculator-form">
                <div class="stepper">
                    <div class="step active" data-step="1" onclick="changeStep(1)">1. 기본설정</div>
                    <div class="step" data-step="2" onclick="changeStep(2)">2. 표지사양</div>
                    <div class="step" data-step="3" onclick="changeStep(3)">3. 내지사양</div>
                    <div class="step" data-step="4" onclick="changeStep(4)">4. 장바구니</div>
                    <div class="step" data-step="5" onclick="changeStep(5)">5. 주문정보</div>
                </div>

                <div class="step-content active" id="step-1">
                    <div class="card">
                        <h2><i class="fas fa-book-open"></i> 기본 설정</h2>
                        <label>사이즈 선택</label><div id="size-options" class="options-grid"></div>
                        <label>제본 방법</label><div id="binding-options" class="options-grid"></div>
                        <label>주문 수량</label><input type="number" id="quantity" value="1" min="1">
                    </div>
                    <button class="next-btn" onclick="changeStep(2)">다음: 표지 사양 ➜</button>
                </div>

                <div class="step-content" id="step-2">
                    <div class="card">
                        <h2><i class="fas fa-layer-group"></i> 표지 사양</h2>
                        <label>표지 재질 및 두께</label><select id="cover-material"></select>
                        <label>표지 후가공 (복수 선택 가능)</label><div id="finishing-options" class="options-grid"></div>
                    </div>
                    <div class="step-actions"><button class="prev-btn" onclick="changeStep(1)">이전</button><button class="next-btn" onclick="changeStep(3)">다음: 내지 사양 ➜</button></div>
                </div>

                <div class="step-content" id="step-3">
                    <div class="card">
                        <h2><i class="fas fa-file-invoice"></i> 내지 사양</h2>
                        <label>내지 재질 및 두께</label><select id="inner-material"></select>
                        <label>인쇄 방식</label><div id="print-sides" class="options-grid"></div>
                        <label>컬러 선택</label><div id="print-color" class="options-grid"></div>
                        <label>페이지 수 (표지 제외) <span id="spine-tip" style="color:var(--primary); font-weight:600;"></span></label>
                        <input type="number" id="inner-pages" value="16" min="2" step="2">
                    </div>
                    <button class="submit-btn" style="background:var(--success);" onclick="addToCart()"><i class="fas fa-cart-plus"></i> 현재 책 장바구니에 담기</button>
                    <div style="margin-top:1rem;"><button class="prev-btn" onclick="changeStep(2)">이전</button></div>
                </div>

                <div class="step-content" id="step-4">
                    <div class="card">
                        <h2><i class="fas fa-shopping-cart"></i> 장바구니 목록</h2>
                        <div id="cart-list"></div>
                        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                            <button class="submit-btn" style="background:#6366f1" onclick="changeStep(1)">+ 다른 책 사양 추가</button>
                            <button class="submit-btn" onclick="changeStep(5)">배송 및 주문 ➜</button>
                        </div>
                    </div>
                </div>

                <div class="step-content" id="step-5">
                    <div class="card">
                        <h2><i class="fas fa-truck-fast"></i> 주문자 상세 정보</h2>
                        <label>성함</label><input type="text" id="orderer-name" placeholder="실명을 입력해주세요">
                        <label>연락처</label><input type="tel" id="orderer-phone" placeholder="010-0000-0000">
                        <label>배송지 주소</label>
                        <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;"><input type="text" id="postcode" placeholder="우편번호" readonly><button onclick="openAddr()" style="background:var(--primary);border:none;color:white;padding:0.5rem 1rem;border-radius:10px;cursor:pointer;">검색</button></div>
                        <input type="text" id="addr1" placeholder="기본 주소" readonly style="margin-bottom:0.5rem;"><input type="text" id="addr2" placeholder="상세 주소를 입력해주세요">
                    </div>
                    <div id="final-price-box" class="total-price" style="margin-bottom:1.5rem;background:rgba(0,0,0,0.1);padding:1rem;border-radius:12px;">최종 합계: 0원</div>
                    <button id="final-order-btn" class="next-btn" style="font-size:1.3rem;" onclick="submitOrder()">최종 주문하기 <i class="fas fa-check"></i></button>
                </div>
            </div>

            <div class="sidebar">
                <div class="card">
                    <div class="mockup-viewport"><div class="book"><div class="side front"><div class="title-label" id="mk-title">PACKAGE</div></div><div class="side spine" id="mk-spine"></div><div class="side top" id="mk-top"></div></div></div>
                    <h3>현재 견적 요약</h3>
                    <div id="summary-content" style="margin-top:1rem;"></div>
                    <div style="height:1px;background:var(--border);margin:1.5rem 0;"></div>
                    <div class="total-price" id="current-total">0 원</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        // --- DATA ---
        const CONSTS = {
            SIZES: ['A4 (210x297)','A5 (148x210)','B5 (182x257)','A6 (105x148)'],
            BINDING: [{id:'perfect',n:'무선제본'},{id:'saddle',n:'중철제본'},{id:'spring',n:'스프링제본'}],
            PAPERS: {
                cover: ['스노우 250g','아트지 250g','랑데뷰 210g','모조 220g'],
                inner: ['모조 80g','모조 100g','스노우 100g','아트지 100g']
            },
            FINISHING: ['무광코팅','유광코팅','금박','은박','에폭시','형압','타공','화이트인쇄'],
            PRICING: { base:5000, binding:{perfect:1500,saddle:800,spring:2500}, paper:500, finishing:1500 }
        };

        // --- STATE ---
        let cart = [];
        let state = {
            size: CONSTS.SIZES[0], binding: 'perfect', quantity: 1, 
            coverMaterial: '스노우 250g', coverFinishing: new Set(['무광코팅']),
            innerMaterial: '모조 80g', innerPrintSides: 'double', innerPrintColor: 'color', innerPages: 16
        };

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzaYE7z43VsuNPp6ZpzXz4TY0W4Wcpc92ec3peMckQddMMQd8b4eRpb54nXUZJTy6Rs/exec';

        // --- UI RENDER ---
        function init() {
            const sg = document.getElementById('size-options');
            CONSTS.SIZES.forEach(s => sg.appendChild(createBtn(s,()=>setS('size',s),s==state.size)));
            const bg = document.getElementById('binding-options');
            CONSTS.BINDING.forEach(b => bg.appendChild(createBtn(b.n,()=>setS('binding',b.id),b.id==state.binding)));
            const cm = document.getElementById('cover-material');
            CONSTS.PAPERS.cover.forEach(p => { const o=document.createElement('option'); o.value=o.text=p; cm.appendChild(o); });
            cm.value = state.coverMaterial; cm.onchange = (e) => setS('coverMaterial',e.target.value);
            const im = document.getElementById('inner-material');
            CONSTS.PAPERS.inner.forEach(p => { const o=document.createElement('option'); o.value=o.text=p; im.appendChild(o); });
            im.value = state.innerMaterial; im.onchange = (e) => setS('innerMaterial',e.target.value);
            const fg = document.getElementById('finishing-options');
            CONSTS.FINISHING.forEach(f => fg.appendChild(createBtn(f,()=>{ if(state.coverFinishing.has(f)) state.coverFinishing.delete(f); else state.coverFinishing.add(f); updateUI(); }, state.coverFinishing.has(f))));
            const ps = document.getElementById('print-sides');
            ps.appendChild(createBtn('양면',()=>setS('innerPrintSides','double'),state.innerPrintSides=='double'));
            ps.appendChild(createBtn('단면',()=>setS('innerPrintSides','single'),state.innerPrintSides=='single'));
            const pc = document.getElementById('print-color');
            pc.appendChild(createBtn('컬러',()=>setS('innerPrintColor','color'),state.innerPrintColor=='color'));
            pc.appendChild(createBtn('흑백',()=>setS('innerPrintColor','bw'),state.innerPrintColor=='bw'));
            document.getElementById('quantity').oninput = (e) => setS('quantity',parseInt(e.target.value)||1);
            document.getElementById('inner-pages').oninput = (e) => setS('innerPages',parseInt(e.target.value)||2);
            updateUI();
        }

        function createBtn(l,c,a) { const b=document.createElement('div'); b.className='option-btn'+(a?' active':''); b.textContent=l; b.onclick=c; return b; }
        function setS(k,v) { state[k]=v; updateUI(); }

        function updateUI() {
            document.querySelectorAll('#size-options .option-btn').forEach(b => b.classList.toggle('active', b.textContent==state.size));
            document.querySelectorAll('#binding-options .option-btn').forEach(b => b.classList.toggle('active', CONSTS.BINDING.find(d=>d.n==b.textContent)?.id==state.binding));
            document.querySelectorAll('#finishing-options .option-btn').forEach(b => b.classList.toggle('active', state.coverFinishing.has(b.textContent)));
            document.querySelectorAll('#print-sides .option-btn').forEach(b => b.classList.toggle('active', (b.textContent=='양면'&&state.innerPrintSides=='double')||(b.textContent=='단면'&&state.innerPrintSides=='single')));
            document.querySelectorAll('#print-color .option-btn').forEach(b => b.classList.toggle('active', (b.textContent=='컬러'&&state.innerPrintColor=='color')||(b.textContent=='흑백'&&state.innerPrintColor=='bw')));
            
            const price = calc(state);
            document.getElementById('current-total').textContent = price.total.toLocaleString() + ' 원';
            document.getElementById('summary-content').innerHTML = `
                <div class="summary-item"><span>사이즈</span><span>${state.size}</span></div>
                <div class="summary-item"><span>제본</span><span>${CONSTS.BINDING.find(b=>b.id==state.binding).n}</span></div>
                <div class="summary-item"><span>수량</span><span>${state.quantity} 부</span></div>
            `;
            const th = parseFloat((state.innerPages/2 * 0.12 + 0.5).toFixed(1));
            document.getElementById('spine-tip').textContent = `(책등 ${th}mm)`;
            const mkS = document.getElementById('mk-spine');
            mkS.style.width = (th*3)+'px'; mkS.style.left = (-th*3)+'px';
            document.getElementById('mk-title').textContent = state.size.split(' ')[0];
        }

        function calc(s) {
            let itemBase = CONSTS.PRICING.base + CONSTS.PRICING.binding[s.binding] + (s.innerPages * (s.innerPrintColor=='color'?100:20));
            s.coverFinishing.forEach(()=>itemBase += CONSTS.PRICING.finishing);
            const total = itemBase * s.quantity;
            return { total: Math.round(total * 1.1) };
        }

        function addToCart() {
            const item = JSON.parse(JSON.stringify(state));
            item.coverFinishing = new Set(state.coverFinishing);
            cart.push(item); renderCart(); changeStep(4);
        }

        function renderCart() {
            const cl = document.getElementById('cart-list'); cl.innerHTML = '';
            let grand = 0;
            if(cart.length==0) cl.innerHTML='<p style="text-align:center;opacity:0.5;">비어있음</p>';
            cart.forEach((it,i) => {
                const p = calc(it); grand += p.total;
                const d = document.createElement('div'); d.className = 'cart-item';
                d.innerHTML = `<div style="display:flex;justify-content:space-between;"><div><strong>${it.size} (${it.quantity}부)</strong><br><small>${p.total.toLocaleString()}원</small></div><button onclick="cart.splice(${i},1);renderCart();" style="border:none;background:none;color:#ff6b6b;cursor:pointer;">삭제</button></div>`;
                cl.appendChild(d);
            });
            document.getElementById('final-price-box').textContent = '최종 합계: ' + grand.toLocaleString() + '원';
        }

        function changeStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.toggle('active', parseInt(s.dataset.step)==n));
            document.querySelectorAll('.step-content').forEach(c => c.classList.toggle('active', c.id==`step-${n}`));
            window.scrollTo(0,0);
        }

        function openAddr() { new daum.Postcode({ oncomplete: (d)=>{ document.getElementById('postcode').value=d.zonecode; document.getElementById('addr1').value=d.roadAddress; } }).open(); }

        async function submitOrder() {
            const n = document.getElementById('orderer-name').value;
            const p = document.getElementById('orderer-phone').value;
            if(!n || !p) return alert('정보 입력 필요');
            
            const btn = document.getElementById('final-order-btn'); btn.disabled=true; btn.innerHTML='전송 중...';
            try {
                const ts = new Date().toLocaleString();
                const ads = `(${document.getElementById('postcode').value}) ${document.getElementById('addr1').value} ${document.getElementById('addr2').value}`;
                const requests = cart.map(it => {
                    const price = calc(it);
                    return fetch(WEB_APP_URL, {
                        method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ timestamp:ts, ordererName:n, ordererPhone:p, address:ads, bookTitle: it.size, size:it.size, quantity:it.quantity, total: price.total })
                    });
                });
                await Promise.all(requests);
                alert('주문 완료!'); location.reload();
            } catch(e) { alert('오류'); btn.disabled=false; btn.innerHTML='최종 주문하기'; }
        }

        init();
    </script>
</body>
</html>
