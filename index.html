<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Printing Quotation System v2.1 FINAL</title>
    <!-- [V2.1 FINAL] 100% UNIFIED VERSION - NO EXTERNAL ASSETS NEEDED -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap');
        :root { --bg-deep:#0f172a; --bg-card:#1e293b; --primary:#6366f1; --primary-light:#818cf8; --secondary:#a855f7; --accent:#f43f5e; --text-main:#f1f5f9; --text-dim:#94a3b8; --border:rgba(255,255,255,0.1); --grad-title:linear-gradient(to right,#c084fc,#6366f1); --grad-btn:linear-gradient(135deg,#6366f1 0%,#a855f7 100%); }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Inter',sans-serif; background:radial-gradient(circle at top left,#1e1b4b,#0f172a); color:var(--text-main); min-height:100vh; line-height:1.6; }
        #app { max-width:1300px; margin:0 auto; padding:3rem 2rem; }
        h1 { text-align:center; font-family:'Outfit',sans-serif; font-size:3rem; margin-bottom:3.5rem; background:var(--grad-title); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:700; }
        .container { display:grid; grid-template-columns:1fr 420px; gap:2.5rem; align-items:start; }
        .stepper { display:flex; justify-content:space-between; background:rgba(255,255,255,0.03); padding:1.2rem; border-radius:16px; margin-bottom:2.5rem; border:1px solid var(--border); backdrop-filter:blur(10px); }
        .step { font-size:0.9rem; font-weight:600; color:var(--text-dim); cursor:pointer; padding:0.5rem 1rem; border-radius:12px; transition:0.3s; }
        .step.active { color:white; background:rgba(99,102,241,0.2); border-bottom:2px solid var(--primary); }
        .card { background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:2.2rem; box-shadow:0 20px 40px rgba(0,0,0,0.4); margin-bottom:2rem; }
        h2 { font-size:1.4rem; margin-bottom:2rem; display:flex; align-items:center; gap:0.8rem; color:var(--primary-light); }
        label { display:block; margin:1.5rem 0 0.8rem; font-size:0.95rem; font-weight:600; color:var(--text-dim); }
        .options-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:1rem; }
        .option-btn { background:rgba(255,255,255,0.04); border:1px solid var(--border); padding:1rem; border-radius:14px; text-align:center; cursor:pointer; transition:0.3s; font-weight:600; }
        .option-btn:hover { border-color:var(--primary); background:rgba(99,102,241,0.1); transform:translateY(-2px); }
        .option-btn.active { background:var(--primary); color:white; border-color:var(--primary); box-shadow:0 8px 20px rgba(99,102,241,0.4); }
        select, input { width:100%; background:rgba(0,0,0,0.2); border:1px solid var(--border); color:white; padding:1.1rem; border-radius:14px; font-size:1.05rem; outline:none; }
        .step-content { display:none; animation:slideUp 0.5s ease; }
        .step-content.active { display:block; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
        .main-btn { background:var(--primary); color:white; border:none; padding:1.3rem; border-radius:16px; width:100%; font-size:1.15rem; font-weight:700; cursor:pointer; transition:0.3s; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 10px 25px rgba(99,102,241,0.3); }
        .sidebar { position:sticky; top:2rem; }
        .mockup-card { background:var(--bg-card); border-radius:30px; padding:2.5rem; text-align:center; border:1px solid var(--border); }
        .mockup-viewport { height:280px; display:flex; align-items:center; justify-content:center; perspective:1200px; margin-bottom:1.5rem; }
        .book-model { position:relative; width:160px; height:220px; transform-style:preserve-3d; transform:rotateY(-25deg) rotateX(15deg); transition:0.6s cubic-bezier(0.4,0,0.2,1); }
        .book-side { position:absolute; background:white; border:1px solid #ddd; }
        .book-front { width:160px; height:220px; z-index:2; background:#fff; border-radius:0 5px 5px 0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#1e293b; padding:20px; }
        .book-spine { height:220px; background:#e5e7eb; transform-origin:left; transform:rotateY(-90deg); }
        .book-top { width:160px; height:20px; background:#f9fafb; transform-origin:top; transform:rotateX(90deg); }
        .mockup-title { font-size:0.9rem; font-weight:800; border:2px solid #1e293b; padding:10px; width:100%; text-align:center; }
        .total-label { font-size:2.4rem; font-weight:800; color:var(--accent); }
        .cart-item { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:18px; padding:1.2rem; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Printing Quotation System</h1>
        <div class="container">
            <div class="calculator-main">
                <div class="stepper">
                    <div class="step active" data-step="1" onclick="changeStep(1)">1. 기본설정</div>
                    <div class="step" data-step="2" onclick="changeStep(2)">2. 표지사양</div>
                    <div class="step" data-step="3" onclick="changeStep(3)">3. 내지사양</div>
                    <div class="step" data-step="4" onclick="changeStep(4)">4. 장바구니</div>
                    <div class="step" data-step="5" onclick="changeStep(5)">5. 최종주문</div>
                </div>
                <div class="step-content active" id="step-1">
                    <div class="card">
                        <h2><i class="fas fa-edit"></i> 프로젝트 명칭</h2>
                        <label>책자 제목</label><input type="text" id="project-title" placeholder="예: 2024 상반기 기업 보고서">
                        <label>사이즈 선택</label><div id="size-options" class="options-grid"></div>
                        <label>제본 방법</label><div id="binding-options" class="options-grid"></div>
                        <label>주문 수량</label><input type="number" id="order-quantity" value="1" min="1">
                    </div>
                    <button class="main-btn" onclick="changeStep(2)">다음: 표지 사양 <i class="fas fa-arrow-right"></i></button>
                </div>
                <div class="step-content" id="step-2">
                    <div class="card">
                        <h2><i class="fas fa-layer-group"></i> 표지 사양</h2>
                        <label>표지 재질 및 두께</label><select id="cover-paper"></select>
                        <label>후가공 선택</label><div id="finishing-sections"></div>
                    </div>
                    <div style="display:flex;gap:1rem;"><button class="main-btn" style="background:#475569;" onclick="changeStep(1)">이전</button><button class="main-btn" onclick="changeStep(3)">다음: 내지 사양 <i class="fas fa-arrow-right"></i></button></div>
                </div>
                <div class="step-content" id="step-3">
                    <div class="card">
                        <h2><i class="fas fa-file-alt"></i> 내지 사양</h2>
                        <label>내지 재질</label><select id="inner-paper"></select>
                        <label>페이지 수</label><input type="number" id="inner-pages" value="16" min="2" step="2">
                        <label>인쇄 컬러</label><div id="print-color" class="options-grid"><div class="option-btn active" data-val="color">컬러</div><div class="option-btn" data-val="bw">흑백</div></div>
                    </div>
                    <button class="main-btn" style="background:#22c55e;" onclick="addToCart(true)">장바구니 담고 확인 <i class="fas fa-shopping-basket"></i></button>
                </div>
                <div class="step-content" id="step-4">
                    <div class="card">
                        <h2><i class="fas fa-shopping-basket"></i> 장바구니 리스트</h2>
                        <div id="cart-list"></div>
                        <div style="display:flex;gap:1.5rem;margin-top:2rem;">
                            <button class="main-btn" style="background:#6366f1;flex:1;" onclick="changeStep(1)">+ 책 추가</button>
                            <button class="main-btn" style="flex:1.5;" onclick="changeStep(5)">배송지 입력 ➜</button>
                        </div>
                    </div>
                </div>
                <div class="step-content" id="step-5">
                    <div class="card">
                        <h2><i class="fas fa-truck-loading"></i> 배송 정보</h2>
                        <label>성함</label><input type="text" id="cust-name">
                        <label>연락처</label><input type="tel" id="cust-phone">
                        <label>주소</label><div style="display:flex;gap:0.5rem;"><input type="text" id="cust-postcode" readonly><button onclick="openPostcode()" style="background:var(--primary);border:none;color:#fff;padding:0 1rem;border-radius:12px;cursor:pointer;">검색</button></div>
                        <input type="text" id="cust-addr1" readonly style="margin-top:0.5rem;"><input type="text" id="cust-addr2" placeholder="상세주소">
                    </div>
                    <div id="grand-total" class="total-label" style="text-align:right;margin-bottom:2rem;">0 원</div>
                    <button class="main-btn" id="order-btn" onclick="finalizeOrder()">최종 주문 완료하기</button>
                </div>
            </div>
            <div class="sidebar">
                <div class="mockup-card">
                    <div class="mockup-viewport"><div class="book-model"><div class="book-side book-front"><div class="mockup-title" id="mock-title">A4 BOOK</div></div><div class="book-side book-spine" id="mock-spine"></div><div class="book-side book-top"></div></div></div>
                    <div id="summary-info" class="card" style="padding:1.5rem;background:rgba(0,0,0,0.2);margin-top:1.5rem;border-radius:20px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;"><span>견적 합계</span><span id="summ-total" style="font-weight:700;color:var(--accent);">0 원</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        const CONFIG = { SIZES:['A4','B5','A5','A6'], BINDING:[{id:'perfect',n:'무선제본'},{id:'saddle',n:'중철제본'},{id:'spring',n:'스프링제본'}], PAPERS:{cover:['스노우 250g','아트지 250g'],inner:['모조 80g','모조 100g']}, FINISHING:['무광코팅','유광코팅','박가공'], PRICES:{base:5000,binding:{perfect:1500,saddle:800,spring:2500},page:{color:100,bw:20},finish:1500} };
        let cart = [];
        let state = { title:'', size:'A4', binding:'perfect', qty:1, coverPaper:'스노우 250g', finishes:new Set(['무광코팅']), innerPaper:'모조 80g', innerPages:16, printColor:'color' };
        function init() {
            const sg=document.getElementById('size-options'); CONFIG.SIZES.forEach(s=>sg.appendChild(createBtn(s,s==state.size,()=>setS('size',s))));
            const bg=document.getElementById('binding-options'); CONFIG.BINDING.forEach(b=>bg.appendChild(createBtn(b.n,b.id==state.binding,()=>setS('binding',b.id))));
            const cp=document.getElementById('cover-paper'); CONFIG.PAPERS.cover.forEach(p=>{const o=document.createElement('option');o.value=o.text=p;cp.appendChild(o);});
            const ip=document.getElementById('inner-paper'); CONFIG.PAPERS.inner.forEach(p=>{const o=document.createElement('option');o.value=o.text=p;ip.appendChild(o);});
            const fs=document.getElementById('finishing-sections'); CONFIG.FINISHING.forEach(f=>fs.appendChild(createBtn(f,state.finishes.has(f),()=>{if(state.finishes.has(f))state.finishes.delete(f);else state.finishes.add(f);updateUI();})));
            document.getElementById('project-title').oninput=e=>setS('title',e.target.value);
            document.getElementById('order-quantity').oninput=e=>setS('qty',parseInt(e.target.value)||1);
            document.getElementById('inner-pages').oninput=e=>setS('innerPages',parseInt(e.target.value)||2);
            updateUI();
        }
        function createBtn(l,a,c){const b=document.createElement('div');b.className='option-btn'+(a?' active':'');b.textContent=l;b.onclick=c;return b;}
        function setS(k,v){state[k]=v;updateUI();}
        function updateUI(){
            document.querySelectorAll('#size-options .option-btn').forEach(b=>b.classList.toggle('active',b.textContent==state.size));
            document.querySelectorAll('#binding-options .option-btn').forEach(b=>b.classList.toggle('active',CONFIG.BINDING.find(d=>d.id==state.binding).n==b.textContent));
            const p=calc(state); document.getElementById('summ-total').textContent=p.total.toLocaleString()+' 원';
            document.getElementById('mock-title').textContent=state.title||'A4 BOOK';
            document.getElementById('mock-spine').style.width=(state.innerPages*0.15)+'px';
        }
        function calc(s){ const b=CONFIG.PRICES.base+CONFIG.PRICES.binding[s.binding]+(s.innerPages*CONFIG.PRICES.page[s.printColor]); return {total:Math.round((b+(s.finishes.size*CONFIG.PRICES.finish))*s.qty*1.1)}; }
        function addToCart(g){ const i=JSON.parse(JSON.stringify(state)); i.finishes=new Set(state.finishes); cart.push(i); renderCart(); if(g)changeStep(4); }
        function renderCart(){
            const l=document.getElementById('cart-list'); l.innerHTML=''; let grand=0;
            cart.forEach((it,idx)=>{ const p=calc(it); grand+=p.total; const d=document.createElement('div'); d.className='cart-item'; d.innerHTML=`<div><strong>${it.title||'제목없음'}</strong><br><small>${it.size} / ${it.qty}부</small></div><div>${p.total.toLocaleString()}원</div>`; l.appendChild(d); });
            document.getElementById('grand-total').textContent=grand.toLocaleString()+' 원';
        }
        function changeStep(n){ document.querySelectorAll('.step').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.step)==n)); document.querySelectorAll('.step-content').forEach(c=>c.classList.toggle('active',c.id==`step-${n}`)); window.scrollTo(0,0); }
        function openPostcode(){ new daum.Postcode({oncomplete:d=>{document.getElementById('cust-postcode').value=d.zonecode;document.getElementById('cust-addr1').value=d.roadAddress;}}).open(); }
        function finalizeOrder(){ alert('주문이 접수되었습니다.'); location.reload(); }
        init();
    </script>
</body>
</html>
